name: ci-native

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  native:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: crystallang/install-crystal@v1
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python3 scripts/validate_scaffold.py
      - run: crystal tool format --check src spec
      - run: crystal build src/crystal_stakeholder.cr -o bin/crystal-stakeholder
      - run: crystal spec
